<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Transport App</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .item { background: #fff; padding: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <h2>Transport App</h2>
    
    <div class="box">
        <input type="text" id="tName" placeholder="Transport Name">
        <input type="text" id="tNumbers" placeholder="Mobile Number">
        <input type="text" id="tVillages" placeholder="Village Name">
        <button class="btn" onclick="saveData()">Save Data</button>
    </div>

    <div class="box">
        <input type="text" id="sInput" placeholder="Search..." oninput="searchData()">
        <div id="results"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const db = getDatabase(initializeApp({databaseURL: "https://transport-fe3d9-default-rtdb.asia-southeast1.firebasedatabase.app/"}));
        
        let dbData = [];
        onValue(ref(db, 'transports'), (snap) => {
            const val = snap.val();
            dbData = val ? Object.values(val) : [];
        });

        window.saveData = () => {
            push(ref(db, 'transports'), {
                name: document.getElementById('tName').value,
                numbers: document.getElementById('tNumbers').value,
                villages: document.getElementById('tVillages').value
            }).then(() => alert("Saved!"));
        };

        window.searchData = () => {
            const query = document.getElementById('sInput').value.toLowerCase();
            const container = document.getElementById('results');
            container.innerHTML = "";
            
            if (query === "") return;

            dbData.forEach(item => {
                if (item.name.toLowerCase().includes(query) || item.villages.toLowerCase().includes(query)) {
                    container.innerHTML += `<div class="item"><strong>${item.name}</strong><br>${item.numbers}<br>${item.villages}</div>`;
                }
            });
        };
    </script>
</body>
</html>
