<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transport Manager</title>
    <style>
        /* यह CSS पूरे ऐप को मोबाइल में फिट रखेगा */
        * { box-sizing: border-box; }
        body { font-family: sans-serif; padding: 10px; margin: 0; background: #f0f2f5; width: 100%; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; position: relative; }
        label { font-size: 14px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 15px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .mic-btn { position: absolute; right: 10px; top: 35px; border: none; background: none; cursor: pointer; font-size: 24px; }
        .round-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #28a745; color: white; cursor: pointer; font-size: 18px; margin-left: 10px; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .result-item { background: #e8f0fe; padding: 15px; margin-top: 10px; border-radius: 8px; border-left: 5px solid #1a73e8; font-size: 16px; }
        button { touch-action: manipulation; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Transport Manager</h2>
    
    <button class="btn" style="background:#d32f2f; color:white; margin-bottom: 15px;" onclick="magicVoice()">Magic Voice Fill</button>

    <div class="card">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <label>TRANSPORT NAME</label>
            <button class="round-btn" onclick="downloadJSON()">↓</button>
        </div>
        <div class="input-group">
            <input type="text" id="tName">
            <button class="mic-btn" onclick="startVoice('tName', false)">🎤</button>
        </div>
        
        <label>MOBILE NUMBERS</label>
        <div class="input-group">
            <input type="text" id="tNumbers" oninput="formatNumber(this)">
            <button class="mic-btn" onclick="startVoice('tNumbers', true)">🎤</button>
        </div>
        
        <label>VILLAGE NAMES</label>
        <div class="input-group">
            <input type="text" id="tVillages">
            <button class="mic-btn" onclick="startVoice('tVillages', true)">🎤</button>
        </div>
        
        <button class="btn" style="background:#1a73e8; color:white;" onclick="saveData()">Save Data</button>
    </div>

    <div class="card">
        <label>SEARCH</label>
        <input type="text" id="searchInput" placeholder="Search..." oninput="searchData()">
        <div id="searchResults"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const db = getDatabase(initializeApp({databaseURL: "https://transport-fe3d9-default-rtdb.asia-southeast1.firebasedatabase.app/"}));
        let allData = {};

        onValue(ref(db, 'transports'), (snap) => { allData = snap.val() || {}; });

        window.formatNumber = (input) => {
            let val = input.value.replace(/[^0-9]/g, '');
            if (val.length > 10) {
                input.value = val.slice(0, 10) + ", " + val.slice(10);
            } else {
                input.value = val;
            }
        };

        window.startVoice = (id, isVillage) => {
            let rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
            rec.lang = 'en-US';
            let timer = setTimeout(() => rec.stop(), 7000);
            rec.onresult = (e) => {
                clearTimeout(timer);
                let text = e.results[0][0].transcript.trim();
                const input = document.getElementById(id);
                if (isVillage && input.value !== "") text = ", " + text;
                input.value = input.value ? input.value + " " + text : text;
                if(id === 'tNumbers') formatNumber(input);
            };
            rec.start();
        };

        window.magicVoice = async () => {
            alert("Step 1: Speak Transport Name");
            await new Promise(r => { startVoice('tName', false); setTimeout(r, 7500); });
            alert("Step 2: Speak Mobile Number");
            await new Promise(r => { startVoice('tNumbers', true); setTimeout(r, 7500); });
            alert("Step 3: Speak Village Name");
            await new Promise(r => { startVoice('tVillages', true); setTimeout(r, 7500); });
        };

        window.saveData = () => {
            push(ref(db, 'transports'), {
                name: document.getElementById('tName').value,
                numbers: document.getElementById('tNumbers').value,
                villages: document.getElementById('tVillages').value
            }).then(() => location.reload());
        };

        window.searchData = () => {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const resDiv = document.getElementById('searchResults');
            resDiv.innerHTML = "";
            if (q === "") return;
            Object.keys(allData).forEach(key => {
                const t = allData[key];
                if ((t.name && t.name.toLowerCase().includes(q)) || (t.villages && t.villages.toLowerCase().includes(q))) {
                    resDiv.innerHTML += `<div class="result-item"><strong>${t.name}</strong><br>${t.numbers}<br>${t.villages}<br>
                    <button onclick="editData('${key}')">Edit</button> <button onclick="deleteData('${key}')">Delete</button></div>`;
                }
            });
        };

        window.deleteData = (key) => { if(confirm("Delete this entry?")) remove(ref(db, 'transports/' + key)); };
        
        window.editData = (key) => {
            const t = allData[key];
            document.getElementById('tName').value = t.name;
            document.getElementById('tNumbers').value = t.numbers;
            document.getElementById('tVillages').value = t.villages;
            window.scrollTo(0,0);
        };

        window.downloadJSON = () => {
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allData));
            a.download = "data.json"; a.click();
        };
    </script>
</body>
</html>
