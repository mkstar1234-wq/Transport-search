<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Cloud Transport Manager</title>
    <style>
        html, body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            box-sizing: border-box;
        }
        body { display: flex; flex-direction: column; padding: 12px; max-width: 450px; margin: auto; }
        h2 { text-align: center; color: #1a73e8; margin: 5px 0; font-size: 22px; font-weight: 700; }
        .card { 
            background: rgba(255, 255, 255, 0.9); padding: 14px; margin-bottom: 10px; 
            border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); 
            border: 1px solid rgba(255,255,255,0.5);
        }
        h3 { margin: 0 0 6px 0; font-size: 14px; color: #5f6368; text-transform: uppercase; }
        
        /* नया इनपुट ग्रुप स्टाइल (माइक को बॉक्स के अंदर सेट करने के लिए) */
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            margin-top: 8px;
        }
        .input-group input {
            width: 100%; padding: 12px 40px 12px 12px; 
            border: 1px solid #dadce0; border-radius: 8px; 
            box-sizing: border-box; font-size: 14px; margin: 0;
        }
        .input-group input:focus { border-color: #1a73e8; outline: none; background-color: #f8f9fa;}
        
        .box-mic-btn {
            position: absolute; right: 5px; background: none; border: none; 
            font-size: 20px; cursor: pointer; color: #1a73e8; padding: 5px; margin: 0; width: auto;
        }

        /* नॉर्मल इनपुट (जैसे सर्च बॉक्स के लिए) */
        input.normal-input { width: 100%; padding: 10px 12px; margin-top: 6px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        /* मैजिक बटन का डिज़ाइन */
        .magic-btn {
            background: linear-gradient(45deg, #ff6b6b, #c0392b); width: 100%;
            color: white; font-size: 16px; padding: 14px; border-radius: 30px;
            font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(192, 57, 43, 0.4);
            margin-bottom: 10px; cursor: pointer; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        .mic-active { border: 2px solid #34a853 !important; background-color: #e6f4ea !important; color: #1e8e3e; font-weight: bold; }
        .save-btn { width: 100%; background-color: #1a73e8; color: white; border: none; font-weight: bold; padding: 12px; font-size: 15px; cursor: pointer; margin-top: 12px; border-radius: 8px;}
        #searchResults { max-height: 120px; overflow-y: auto; margin-top: 5px; }
        .result-item { background: #e8f0fe; margin-top: 5px; padding: 10px; border-radius: 6px; border-left: 4px solid #1a73e8; font-size: 13px; }
        .action-container { display: flex; gap: 8px; margin-top: 8px; }
        .edit-btn { background-color: #007bc4; color: white; padding: 5px; font-size: 12px; margin-top: 0; border-radius: 4px; border:none; cursor: pointer; }
        .delete-btn { background-color: #d93025; color: white; padding: 5px; font-size: 12px; margin-top: 0; border-radius: 4px; border:none; cursor: pointer; }
        .highlight { background-color: #fff263; padding: 2px; font-weight: bold; }
        .error-msg { color: #d93025; margin-top: 5px; font-weight: bold; font-size: 12px; }
        .status-bar { text-align: center; color: #1e8e3e; font-weight: bold; margin-bottom: 6px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>Cloud Transport App</h2>
    <div id="connectionStatus" class="status-bar" style="color: orange;">Connecting to Server...</div>

    <button class="magic-btn" onclick="startMagicFlow()">🎤 Magic Button: Direct Voice Fill</button>

    <div class="card">
        <h3>Search Village</h3>
        <input type="text" id="searchInput" class="normal-input" placeholder="Type village name here..." onkeyup="searchVillage()">
        <div id="searchResults"></div>
    </div>

    <div class="card" style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; margin-bottom: 5px;">
        <h3 id="formTitle">Direct Voice / Manual Entry</h3>
        
        <div class="input-group">
            <input type="text" id="transportName" placeholder="Transport Name">
            <button class="box-mic-btn" onclick="startRealVoice('name', document.getElementById('transportName'))">🎤</button>
        </div>

        <div class="input-group">
            <input type="text" id="transportNumbers" placeholder="Mobile Numbers">
            <button class="box-mic-btn" onclick="startRealVoice('numbers', document.getElementById('transportNumbers'))">🎤</button>
        </div>

        <div class="input-group">
            <input type="text" id="villageNames" placeholder="Village Names">
            <button class="box-mic-btn" onclick="startRealVoice('villages', document.getElementById('villageNames'))">🎤</button>
        </div>
        
        <button id="saveMainBtn" class="save-btn" onclick="addTransport()">Save Data</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://transport-fe3d9-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const transportsRef = ref(db, 'transports');

        let transportData = {};
        let currentEditKey = null;

        onValue(transportsRef, (snapshot) => {
            const data = snapshot.val();
            transportData = data ? data : {};
            document.getElementById("connectionStatus").innerText = "Connected to Secure Cloud Server!";
            document.getElementById("connectionStatus").style.color = "#1e8e3e";
            if(document.getElementById("searchInput").value.trim() !== "") searchVillage();
        });

        // 🌟 अब किसी हिंदी कन्वर्टर की ज़रूरत नहीं 🌟
        function processInputData(text, fieldType) {
            let processedText = text.trim();
            if (fieldType === 'numbers') {
                let cleanNumbers = processedText.replace(/\D/g, ''); 
                let chunks = cleanNumbers.match(/.{1,10}/g); 
                return chunks ? chunks.join(', ') : cleanNumbers;
            } else if (fieldType === 'villages') {
                // गाँव के नामों को स्पेस या कॉमा के हिसाब से सेट करना
                return processedText.replace(/[,\s]+/g, ', ').replace(/,+$/, '').toLowerCase();
            }
            return processedText.toLowerCase();
        }

        window.listenAndFill = function(fieldType, inputElement) {
            return new Promise((resolve, reject) => {
                let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("Voice typing is not supported in this browser.");
                    reject("Not supported");
                    return;
                }

                let recognition = new SpeechRecognition();
                // 🌟 सबसे बड़ा बदलाव: 'en-IN' (Indian English) सेट किया गया है 🌟
                recognition.lang = 'en-IN'; 
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                let originalPlaceholder = inputElement.placeholder;
                inputElement.placeholder = "🎤 Listening...";
                inputElement.classList.add('mic-active');

                let gotResult = false;

                recognition.start();

                recognition.onresult = function(event) {
                    gotResult = true;
                    // Google अब खुद परफेक्ट इंग्लिश स्पेलिंग देगा
                    let spokenText = event.results[0][0].transcript;
                    inputElement.value = processInputData(spokenText, fieldType);
                    resolve(true);
                };

                recognition.onerror = function(event) {
                    reject(event.error);
                };

                recognition.onend = function() {
                    inputElement.placeholder = originalPlaceholder;
                    inputElement.classList.remove('mic-active');
                    if (!gotResult) {
                        reject("no-speech");
                    }
                };
            });
        }

        window.startMagicFlow = async function() {
            let btn = document.querySelector('.magic-btn');
            let originalBtnText = "🎤 Magic Button: Direct Voice Fill";

            let nameBox = document.getElementById("transportName");
            let numBox = document.getElementById("transportNumbers");
            let villBox = document.getElementById("villageNames");

            try {
                btn.innerHTML = "🎤 1/3: Speak Transport Name...";
                await listenAndFill('name', nameBox);
                await new Promise(r => setTimeout(r, 500));

                btn.innerHTML = "🎤 2/3: Speak Mobile Numbers...";
                await listenAndFill('numbers', numBox);
                await new Promise(r => setTimeout(r, 500));

                btn.innerHTML = "🎤 3/3: Speak Village Names...";
                await listenAndFill('villages', villBox);

                btn.innerHTML = "✅ Data Filled! Please Save";
                setTimeout(() => { btn.innerHTML = originalBtnText; }, 3000);

            } catch (error) {
                btn.innerHTML = "⚠️ Voice Stopped. Try Again.";
                setTimeout(() => { btn.innerHTML = originalBtnText; }, 3000);
            }
        }

        window.startRealVoice = function(fieldType, inputElement) {
            listenAndFill(fieldType, inputElement).catch(e => {
                if(e !== 'no-speech') console.log(e);
            });
        }

        window.addTransport = function() {
            let name = document.getElementById("transportName").value.trim();
            let numbers = document.getElementById("transportNumbers").value.trim();
            let villages = document.getElementById("villageNames").value.trim().toLowerCase();

            if(name === "" || villages === "") return alert("Please fill Transport Name and Village Names!");

            let entryData = {
                name: name,
                numbers: numbers,
                villages: villages.split(",").map(v => v.trim()).filter(v => v !== "")
            };

            if (currentEditKey) {
                set(ref(db, 'transports/' + currentEditKey), entryData).then(() => {
                    alert("✅ Data Updated Successfully!"); 
                    resetForm();
                });
            } else {
                push(transportsRef, entryData).then(() => {
                    alert("✅ Data Saved Successfully!"); 
                    resetForm();
                });
            }
        }

        function resetForm() {
            document.getElementById("transportName").value = "";
            document.getElementById("transportNumbers").value = "";
            document.getElementById("villageNames").value = "";
            currentEditKey = null;
            document.getElementById("formTitle").innerText = "Direct Voice / Manual Entry";
            document.getElementById("saveMainBtn").innerText = "Save Data";
            document.getElementById("saveMainBtn").style.background = "#1a73e8";
        }

        window.editEntry = function(key) {
            let item = transportData[key];
            if(!item) return;
            currentEditKey = key;
            document.getElementById("transportName").value = item.name;
            document.getElementById("transportNumbers").value = item.numbers || "";
            document.getElementById("villageNames").value = item.villages ? item.villages.join(", ") : "";
            document.getElementById("formTitle").innerText = "📝 Edit Mode: Modifying " + item.name;
            document.getElementById("saveMainBtn").innerText = "Update Data";
            document.getElementById("saveMainBtn").style.background = "#007bc4";
        }

        window.deleteEntry = function(key) {
            if(confirm("⚠️ Are you sure you want to permanently delete this data?")) {
                remove(ref(db, 'transports/' + key)).then(() => alert("🗑️ Data Deleted!"));
            }
        }

        window.searchVillage = function() {
            let searchValue = document.getElementById("searchInput").value.trim().toLowerCase();
            let resultsDiv = document.getElementById("searchResults");
            resultsDiv.innerHTML = ""; 
            if(searchValue === "") return;

            let found = false;
            for (let key in transportData) {
                let t = transportData[key];
                if (t.villages && t.villages.some(v => v.includes(searchValue))) {
                    found = true;
                    let villageListStr = t.villages.join(", ");
                    let regex = new RegExp(searchValue, "gi");
                    let highlightedVillages = villageListStr.replace(regex, match => `<span class="highlight">${match}</span>`);

                    resultsDiv.innerHTML += `
                        <div class="result-item">
                            <strong style="color: #1a73e8; font-size:15px;">${t.name}</strong><br>
                            <span style="color: #5f6368; font-weight:600;">No:</span> ${t.numbers ? t.numbers : 'N/A'}<br>
                            <span style="color: #1e8e3e; font-weight:600;">Villages:</span> ${highlightedVillages}
                            <div class="action-container">
                                <button class="edit-btn" onclick="editEntry('${key}')">✏️ Edit</button>
                                <button class="delete-btn" onclick="deleteEntry('${key}')">🗑️ Delete</button>
                            </div>
                        </div>
                    `;
                }
            }
            if (!found) resultsDiv.innerHTML = "<p class='error-msg'>No transport found for this village.</p>";
        }
    </script>
</body>
</html>
