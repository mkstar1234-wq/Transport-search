
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transport Manager</title>
    <style>
        body { font-family: sans-serif; padding: 15px; max-width: 450px; margin: auto; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .mic-btn { position: absolute; right: 25px; cursor: pointer; border: none; background: none; font-size: 20px; }
        .magic-btn { background: #d32f2f; color: white; padding: 15px; width: 100%; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .result-item { background: #e8f0fe; padding: 10px; margin-top: 5px; border-radius: 8px; border-left: 4px solid #1a73e8; }
    </style>
</head>
<body>

    <h2>Transport Manager</h2>
    <button class="magic-btn" onclick="startMagicFlow()">Magic Button: Voice Fill</button>

    <div class="card">
        <label>SEARCH (Live)</label>
        <input type="text" id="searchInput" placeholder="Type to search..." oninput="searchData()">
        <div id="searchResults"></div>
    </div>

    <div class="card">
        <label>TRANSPORT NAME</label>
        <div style="display:flex; align-items:center;">
            <input type="text" id="transportName">
            <button class="mic-btn" onclick="startVoice('transportName', false)">🎤</button>
        </div>
        
        <label>MOBILE NUMBERS</label>
        <div style="display:flex; align-items:center;">
            <input type="text" id="transportNumbers">
            <button class="mic-btn" onclick="startVoice('transportNumbers', true)">🎤</button>
        </div>
        
        <label>VILLAGE NAMES</label>
        <div style="display:flex; align-items:center;">
            <input type="text" id="villageNames">
            <button class="mic-btn" onclick="startVoice('villageNames', true)">🎤</button>
        </div>
        
        <button onclick="addTransport()" style="width:100%; padding:15px; margin-top:20px; background:#1a73e8; color:white; border:none; border-radius:8px;">Save Data</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const db = getDatabase(initializeApp({databaseURL: "https://transport-fe3d9-default-rtdb.asia-southeast1.firebasedatabase.app/"}));
        let transportData = {};

        onValue(ref(db, 'transports'), (snapshot) => { transportData = snapshot.val() || {}; });

        window.searchData = () => {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const resDiv = document.getElementById("searchResults");
            resDiv.innerHTML = "";
            if (!query) return;

            Object.values(transportData).forEach(t => {
                const name = (t.name || "").toLowerCase();
                const village = (t.villages || "").toLowerCase();
                if (name.includes(query) || village.includes(query)) {
                    resDiv.innerHTML += `<div class="result-item"><strong>${t.name}</strong><br>No: ${t.numbers}<br>Village: ${t.villages}</div>`;
                }
            });
        };

        window.startVoice = (id, allowComma) => {
            const rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
            rec.lang = 'en-US';
            rec.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                const input = document.getElementById(id);
                // अगर allowComma true है, तो पुराने डेटा के साथ जोड़ें, वरना सिर्फ नया टेक्स्ट रखें
                if (allowComma) {
                    input.value = input.value ? input.value + ", " + transcript : transcript;
                } else {
                    input.value = transcript;
                }
            };
            rec.start();
        };

        window.addTransport = () => {
            push(ref(db, 'transports'), {
                name: document.getElementById("transportName").value,
                numbers: document.getElementById("transportNumbers").value,
                villages: document.getElementById("villageNames").value
            }).then(() => { alert("Saved!"); location.reload(); });
        };
    </script>
</body>
</html>
