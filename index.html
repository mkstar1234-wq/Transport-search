<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Cloud Transport Manager</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: sans-serif; background: #f5f7fa; }
        body { display: flex; flex-direction: column; padding: 12px; max-width: 450px; margin: auto; }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 5px 0; }
        h2 { color: #1a73e8; margin: 0; font-size: 20px; }
        .download-btn { background: #34a853; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        .card { background: white; padding: 14px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { position: relative; display: flex; align-items: center; margin-top: 8px; }
        .input-group input { width: 100%; padding: 12px 40px 12px 12px; border: 1px solid #ccc; border-radius: 8px; }
        .box-mic-btn { position: absolute; right: 5px; background: none; border: none; font-size: 20px; cursor: pointer; }
        .save-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background-color: #1a73e8; color: white; border: none; padding: 16px; border-radius: 30px; font-weight: bold; }
        #searchResults { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .result-item { background: #e8f0fe; margin-bottom: 8px; padding: 10px; border-radius: 6px; font-size: 14px; border-left: 4px solid #1a73e8; }
        .status-bar { text-align: center; font-size: 12px; color: green; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>Cloud Transport App</h2>
        <button class="download-btn" onclick="downloadData()">↓</button>
    </div>
    <div id="connectionStatus" class="status-bar">Connecting...</div>

    <div class="card">
        <h3>Search Village</h3>
        <input type="text" id="searchInput" placeholder="Type village name..." onkeyup="searchVillage()">
        <div id="searchResults"></div>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="transportName" placeholder="Transport Name">
            <button class="box-mic-btn" onclick="startRealVoice('transportName')">🎤</button>
        </div>
        <div class="input-group">
            <input type="text" id="transportNumbers" placeholder="Mobile Numbers">
            <button class="box-mic-btn" onclick="startRealVoice('transportNumbers')">🎤</button>
        </div>
        <div class="input-group">
            <input type="text" id="villageNames" placeholder="Village Names">
            <button class="box-mic-btn" onclick="startRealVoice('villageNames')">🎤</button>
        </div>
    </div>
    
    <button class="save-btn" onclick="addTransport()">Save Data</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://transport-fe3d9-default-rtdb.asia-southeast1.firebasedatabase.app/" }));
        let transportData = {};

        onValue(ref(db, 'transports'), (snapshot) => {
            transportData = snapshot.val() || {};
            document.getElementById("connectionStatus").innerText = "Connected!";
        });

        window.downloadData = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(transportData));
            const a = document.createElement('a'); a.href = dataStr; a.download = "transports.json"; a.click();
        }

        window.startRealVoice = (id) => {
            const input = document.getElementById(id);
            let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'en-IN';
            const timer = setTimeout(() => rec.stop(), 7000);
            rec.onresult = (e) => {
                clearTimeout(timer);
                input.value = (input.value ? input.value + ", " : "") + e.results[0][0].transcript;
            };
            rec.start();
        };

        window.addTransport = () => {
            push(ref(db, 'transports'), {
                name: document.getElementById("transportName").value,
                numbers: document.getElementById("transportNumbers").value,
                villages: document.getElementById("villageNames").value.split(",").map(v => v.trim())
            });
            alert("Saved!"); location.reload();
        };

        window.searchVillage = () => {
            let val = document.getElementById("searchInput").value.toLowerCase();
            let res = document.getElementById("searchResults");
            res.innerHTML = "";
            for (let key in transportData) {
                let item = transportData[key];
                if (item.villages.some(v => v.toLowerCase().includes(val))) {
                    res.innerHTML += `<div class="result-item">
                        <strong>${item.name}</strong><br>
                        Mob: ${item.numbers || 'N/A'}<br>
                        Villages: ${item.villages.join(", ")}
                    </div>`;
                }
            }
        };
    </script>
</body>
</html>
