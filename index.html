<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Manager</title>
    <style>
        body { font-family: sans-serif; padding: 15px; max-width: 450px; margin: auto; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .input-wrapper { position: relative; margin-top: 5px; }
        input { width: 100%; padding: 12px 45px 12px 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .mic-btn { position: absolute; right: 10px; top: 10px; border: none; background: none; cursor: pointer; font-size: 20px; }
        .round-btn { width: 35px; height: 35px; border-radius: 50%; border: none; background: #28a745; color: white; cursor: pointer; font-size: 16px; margin-left: 10px; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .result-item { background: #fff; padding: 10px; margin-top: 8px; border-radius: 8px; border-left: 4px solid #1a73e8; }
    </style>
</head>
<body>

    <h2>Transport Manager</h2>
    
    <div class="card">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <label><strong>TRANSPORT NAME</strong></label>
            <button class="round-btn" onclick="downloadJSON()">↓</button>
        </div>
        <div class="input-wrapper">
            <input type="text" id="tName">
            <button class="mic-btn" onclick="startVoice('tName', false)">🎤</button>
        </div>
        
        <label>MOBILE NUMBERS</label>
        <div class="input-wrapper">
            <input type="text" id="tNumbers">
            <button class="mic-btn" onclick="startVoice('tNumbers', true)">🎤</button>
        </div>
        
        <label>VILLAGE NAMES</label>
        <div class="input-wrapper">
            <input type="text" id="tVillages">
            <button class="mic-btn" onclick="startVoice('tVillages', true)">🎤</button>
        </div>
        
        <button class="btn" style="background:#d32f2f; color:white;" onclick="magicVoice()">Magic Voice Fill</button>
        <button class="btn" style="background:#1a73e8; color:white;" onclick="saveData()">Save Data</button>
    </div>

    <div class="card">
        <label><strong>SEARCH</strong></label>
        <input type="text" id="searchInput" placeholder="Search..." oninput="searchData()">
        <div id="searchResults"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const db = getDatabase(initializeApp({databaseURL: "https://transport-fe3d9-default-rtdb.asia-southeast1.firebasedatabase.app/"}));
        let allData = {};

        onValue(ref(db, 'transports'), (snap) => { allData = snap.val() || {}; });

        window.startVoice = (id, allowComma) => {
            const input = document.getElementById(id);
            let rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
            rec.lang = 'en-US';
            let timer = setTimeout(() => rec.stop(), 7000);
            rec.onresult = (e) => {
                clearTimeout(timer);
                let text = e.results[0][0].transcript;
                if (allowComma) text += ", ";
                input.value = input.value ? input.value + " " + text : text;
            };
            rec.start();
        };

        window.saveData = () => {
            push(ref(db, 'transports'), {
                name: document.getElementById('tName').value,
                numbers: document.getElementById('tNumbers').value,
                villages: document.getElementById('tVillages').value
            }).then(() => location.reload());
        };

        window.searchData = () => {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const resDiv = document.getElementById('searchResults');
            resDiv.innerHTML = "";
            Object.keys(allData).forEach(key => {
                const t = allData[key];
                if ((t.name && t.name.toLowerCase().includes(q)) || (t.villages && t.villages.toLowerCase().includes(q))) {
                    resDiv.innerHTML += `<div class="result-item"><strong>${t.name}</strong><br>${t.numbers}<br>${t.villages}
                    <button onclick="deleteData('${key}')" style="margin-left:10px; color:red; border:none; background:none;">Delete</button></div>`;
                }
            });
        };

        window.deleteData = (key) => { remove(ref(db, 'transports/' + key)).then(() => searchData()); };

        window.downloadJSON = () => {
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allData));
            a.download = "data.json"; a.click();
        };

        window.magicVoice = async () => {
            await startVoice('tName', false);
            setTimeout(() => startVoice('tNumbers', true), 8000);
            setTimeout(() => startVoice('tVillages', true), 16000);
        };
    </script>
</body>
</html>
