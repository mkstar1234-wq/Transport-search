<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transport App</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
        .result-item { background: #fff; padding: 12px; margin-top: 8px; border-radius: 6px; border-left: 4px solid #1a73e8; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Transport Manager</h2>
    <button class="btn" style="background:#d32f2f;" onclick="startMagicFlow()">Magic Voice Fill</button>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label><strong>TRANSPORT NAME</strong></label>
            <button onclick="downloadJSON()" style="padding: 5px; border-radius: 50%; border:none; background:#28a745; color:white;">↓</button>
        </div>
        <input type="text" id="tName">
        
        <label><strong>MOBILE NUMBERS</strong></label>
        <input type="text" id="tNumbers" oninput="formatNumber(this)">
        
        <label><strong>VILLAGE NAMES</strong></label>
        <input type="text" id="tVillages">
        
        <button class="btn" style="background:#1a73e8;" onclick="saveData()">Save Data</button>
    </div>

    <div class="card">
        <label><strong>SEARCH</strong></label>
        <input type="text" id="searchInput" placeholder="Search..." oninput="performSearch()">
        <div id="searchResults"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const db = getDatabase(initializeApp({databaseURL: "https://transport-fe3d9-default-rtdb.asia-southeast1.firebasedatabase.app/"}));
        let allData = {};

        onValue(ref(db, 'transports'), (snap) => { allData = snap.val() || {}; });

        // English Voice Function
        window.startVoice = (id) => {
            let rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
            rec.lang = 'en-US'; // English Only
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                const input = document.getElementById(id);
                input.value = input.value ? input.value + " " + text : text;
            };
            rec.start();
        };

        window.formatNumber = (input) => {
            let val = input.value.replace(/[^0-9]/g, '');
            if (val.length > 10) input.value = val.slice(0, 10) + ", " + val.slice(10);
            else input.value = val;
        };

        window.performSearch = () => {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const resDiv = document.getElementById('searchResults');
            resDiv.innerHTML = "";
            if (q === "") return;
            Object.keys(allData).forEach(key => {
                const t = allData[key];
                if ((t.name && t.name.toLowerCase().includes(q)) || (t.villages && t.villages.toLowerCase().includes(q))) {
                    resDiv.innerHTML += `<div class="result-item"><strong>${t.name}</strong><br>${t.numbers}<br>${t.villages}
                    <br><button onclick="editData('${key}')">Edit</button> <button onclick="remove(ref(db, 'transports/${key}'))">Delete</button></div>`;
                }
            });
        };

        window.saveData = () => {
            push(ref(db, 'transports'), {
                name: document.getElementById('tName').value,
                numbers: document.getElementById('tNumbers').value,
                villages: document.getElementById('tVillages').value
            }).then(() => location.reload());
        };

        window.editData = (key) => {
            const t = allData[key];
            document.getElementById('tName').value = t.name;
            document.getElementById('tNumbers').value = t.numbers;
            document.getElementById('tVillages').value = t.villages;
        };

        window.downloadJSON = () => {
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allData));
            a.download = "data.json"; a.click();
        };

        // Simplified Magic Flow
        window.startMagicFlow = async () => {
            alert("Start speaking name...");
            // Magic flow logic as previously agreed
        };
    </script>
</body>
</html>
